    <radialGradient id="wUL" cx="35%" cy="42%" r="65%">
      <stop offset="0%"   stop-color="#FFF8D0"/>
      <stop offset="45%"  stop-color="#FFD166"/>
      <stop offset="78%"  stop-color="#E89010"/>
      <stop offset="100%" stop-color="#C3A9F5"/>
    </radialGradient>
    <radialGradient id="wUR" cx="65%" cy="42%" r="65%">
      <stop offset="0%"   stop-color="#FFF8D0"/>
      <stop offset="45%"  stop-color="#FFD166"/>
      <stop offset="78%"  stop-color="#FFA030"/>
      <stop offset="100%" stop-color="#B8A0E8"/>
    </radialGradient>
    <radialGradient id="wLL" cx="35%" cy="58%" r="65%">
      <stop offset="0%"   stop-color="#FFE8A0"/>
      <stop offset="55%"  stop-color="#FFC030"/>
      <stop offset="100%" stop-color="#C3A9F5"/>
