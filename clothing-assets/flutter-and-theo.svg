<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480">
  <defs>
    <linearGradient id="capeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="20%"  stop-color="#FFD166"/>
      <stop offset="40%"  stop-color="#6EC6F5"/>
      <stop offset="60%"  stop-color="#6FDEBC"/>
      <stop offset="80%"  stop-color="#C3A9F5"/>
      <stop offset="100%" stop-color="#FF8FAB"/>
    </linearGradient>
    <linearGradient id="suitG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#0d1a3a"/>
    </linearGradient>
    <radialGradient id="skinG" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B3F1E"/>
    </radialGradient>
    <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C3A9F5"/>
      <stop offset="33%"  stop-color="#6EC6F5"/>
      <stop offset="66%"  stop-color="#6FDEBC"/>
      <stop offset="100%" stop-color="#FF8FAB"/>
    </linearGradient>
    <linearGradient id="specBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="20%"  stop-color="#FFD166"/>
      <stop offset="40%"  stop-color="#6EC6F5"/>
      <stop offset="60%"  stop-color="#6FDEBC"/>
      <stop offset="80%"  stop-color="#C3A9F5"/>
      <stop offset="100%" stop-color="#FF8FAB"/>
    </linearGradient>
  </defs>

  <!-- Ground spectrum line -->
  <rect x="60" y="368" width="380" height="4" rx="2" fill="url(#specBar)"/>

  <!-- ════════════════
       SUPER THEO (left)
       Center: x=148
       ════════════════ -->

  <!-- Cape -->
  <path d="M 114,145 C 82,162 44,222 38,295
           C 32,358 68,390 102,378
           C 124,368 140,344 148,320
           C 156,344 172,368 194,378
           C 228,390 264,358 258,295
           C 252,222 214,162 182,145 Z"
        fill="url(#capeG)" opacity="0.9"/>

  <!-- Left arm raised -->
  <path d="M 114,165 C 90,158 64,144 50,128" stroke="url(#suitG)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 50,128 C 40,114 34,96 38,78"    stroke="url(#suitG)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="70" r="14" fill="#6FDEBC"/>
  <circle cx="42" cy="70" r="10" fill="#40C898"/>

  <!-- Right arm at side -->
  <path d="M 182,165 C 202,163 220,168 230,180" stroke="url(#suitG)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 230,180 C 238,192 240,210 236,228"  stroke="url(#suitG)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <circle cx="232" cy="236" r="14" fill="#C3A9F5"/>
  <circle cx="232" cy="236" r="10" fill="#A880F0"/>

  <!-- Torso -->
  <rect x="104" y="148" width="88" height="94" rx="9" fill="url(#suitG)"/>
  <!-- Chest puzzle piece outline -->
  <path d="M 128,168 H 139 Q 139,162 146,162 Q 153,162 153,168 H 164
           V 179 Q 170,179 170,186 Q 170,193 164,193 V 200
           H 139 V 193 Q 133,193 133,186 Q 133,179 139,179 V 168 Z"
        fill="none" stroke="rgba(195,169,245,0.55)" stroke-width="1.8"/>
  <!-- Spectrum belt -->
  <rect x="104" y="232" width="88" height="9" rx="2" fill="url(#capeG)"/>

  <!-- Legs -->
  <rect x="112" y="240" width="30" height="90" rx="7" fill="url(#suitG)"/>
  <rect x="154" y="240" width="30" height="90" rx="7" fill="url(#suitG)"/>

  <!-- Mismatched boots -->
  <rect x="108" y="322" width="38" height="24" rx="7" fill="#6EC6F5"/>
  <rect x="106" y="336" width="42" height="12" rx="5" fill="#3AAED8"/>
  <rect x="150" y="322" width="38" height="24" rx="7" fill="#FFD166"/>
  <rect x="148" y="336" width="42" height="12" rx="5" fill="#F0B800"/>

  <!-- Head -->
  <circle cx="148" cy="96" r="42" fill="url(#skinG)"/>
  <ellipse cx="106" cy="98" rx="7" ry="10" fill="#7A4E28"/>
  <ellipse cx="190" cy="98" rx="7" ry="10" fill="#7A4E28"/>
  <!-- Hair -->
  <path d="M 108,70 C 110,48 128,36 148,34 C 168,36 186,48 188,70
           C 182,56 168,48 148,48 C 128,48 114,56 108,70 Z" fill="#1a1a2e"/>

  <!-- Mask + eyes -->
  <path d="M 122,95 Q 135,88 148,95 Q 161,88 174,95 Q 174,108 161,108
           Q 148,102 148,102 Q 148,102 135,108 Q 122,108 122,95 Z"
        fill="#1a1a2e" opacity="0.75"/>
  <circle cx="135" cy="100" r="7"   fill="white"/>
  <circle cx="161" cy="100" r="7"   fill="white"/>
  <circle cx="136" cy="101" r="4.5" fill="#4A2800"/>
  <circle cx="162" cy="101" r="4.5" fill="#4A2800"/>
  <circle cx="136" cy="101" r="2.5" fill="#1a1a2e"/>
  <circle cx="162" cy="101" r="2.5" fill="#1a1a2e"/>
  <circle cx="135" cy="101" r="7"   fill="#FFD166" opacity="0.14"/>
  <circle cx="161" cy="101" r="7"   fill="#FFD166" opacity="0.14"/>
  <circle cx="137" cy="98"  r="1.8" fill="white"/>
  <circle cx="163" cy="98"  r="1.8" fill="white"/>
  <!-- Smile -->
  <path d="M 138,112 Q 148,120 158,112" stroke="#5A3010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 127,89 Q 135,85 143,88" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 153,88 Q 161,85 169,89" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ════════════════
       FLUTTER (right)
       Center: x=360
       ════════════════ -->

  <!-- Upper Left Wing -->
  <path d="M 352,210
           C 322,172 252,132 228,152
           C 208,170 228,208 282,228
           C 312,238 340,242 352,244"
        fill="#C3A9F5" stroke="#B090E0" stroke-width="1.5"/>
  <!-- Upper left accent -->
  <path d="M 352,222 C 326,196 268,166 248,178 C 232,188 248,212 295,228"
        fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.2"/>
  <!-- Eye spot UL -->
  <circle cx="248" cy="170" r="16" fill="rgba(255,255,255,0.22)"/>
  <circle cx="248" cy="170" r="10" fill="#9B6EE8" opacity="0.65"/>
  <circle cx="248" cy="170" r="5"  fill="#1a1a2e" opacity="0.55"/>
  <circle cx="244" cy="166" r="2"  fill="rgba(255,255,255,0.7)"/>

  <!-- Upper Right Wing -->
  <path d="M 368,210
           C 398,172 468,132 492,152
           C 512,170 492,208 438,228
           C 408,238 380,242 368,244"
        fill="#6EC6F5" stroke="#4AAAD8" stroke-width="1.5"/>
  <path d="M 368,222 C 394,196 452,166 472,178 C 488,188 472,212 425,228"
        fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.2"/>
  <!-- Eye spot UR -->
  <circle cx="472" cy="170" r="16" fill="rgba(255,255,255,0.22)"/>
  <circle cx="472" cy="170" r="10" fill="#3AAED8" opacity="0.65"/>
  <circle cx="472" cy="170" r="5"  fill="#1a1a2e" opacity="0.55"/>
  <circle cx="468" cy="166" r="2"  fill="rgba(255,255,255,0.7)"/>

  <!-- Lower Left Wing -->
  <path d="M 352,252
           C 318,268 256,286 245,304
           C 234,322 272,332 312,316
           C 338,306 352,284 352,272"
        fill="#FF8FAB" stroke="#E06080" stroke-width="1.5"/>
  <!-- Lower Right Wing -->
  <path d="M 368,252
           C 402,268 464,286 475,304
           C 486,322 448,332 408,316
           C 382,306 368,284 368,272"
        fill="#6FDEBC" stroke="#40C090" stroke-width="1.5"/>

  <!-- Flutter Body -->
  <ellipse cx="360" cy="252" rx="8" ry="50" fill="#1a1a2e"/>

  <!-- Flutter Head -->
  <circle cx="360" cy="196" r="18" fill="#1a1a2e"/>
  <!-- Flutter Eyes -->
  <circle cx="354" cy="193" r="6"   fill="white"/>
  <circle cx="366" cy="193" r="6"   fill="white"/>
  <circle cx="354.5" cy="194" r="3.8" fill="#6EC6F5"/>
  <circle cx="366.5" cy="194" r="3.8" fill="#C3A9F5"/>
  <circle cx="355"   cy="194" r="2"   fill="#1a1a2e"/>
  <circle cx="367"   cy="194" r="2"   fill="#1a1a2e"/>
  <circle cx="356"   cy="192" r="1"   fill="white"/>
  <circle cx="368"   cy="192" r="1"   fill="white"/>
  <!-- Flutter smile -->
  <path d="M 355,202 Q 360,207 365,202" stroke="#FF8FAB" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="350" cy="200" r="3.5" fill="#FF8FAB" opacity="0.3"/>
  <circle cx="370" cy="200" r="3.5" fill="#FF8FAB" opacity="0.3"/>
  <!-- Antennae -->
  <path d="M 356,180 C 352,168 346,158 342,150" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 364,180 C 368,168 374,158 378,150" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="340" cy="148" r="5.5" fill="#FF8FAB"/>
  <circle cx="380" cy="148" r="5.5" fill="#C3A9F5"/>

  <!-- ════════════════
       SHARED SPARKLES
       ════════════════ -->
  <g transform="translate(270,95)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD166" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD166" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD166" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="6"  y1="-6" x2="-6" y2="6" stroke="#FFD166" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="210" cy="260" r="3" fill="#FFD166" opacity="0.7"/>
  <circle cx="20"  cy="180" r="2.5" fill="#C3A9F5" opacity="0.6"/>
  <circle cx="490" cy="115" r="2.5" fill="#6EC6F5" opacity="0.6"/>
  <circle cx="480" cy="340" r="2.5" fill="#6FDEBC" opacity="0.6"/>

  <!-- ════════════════
       NAMES + TITLE
       ════════════════ -->
  <text x="148" y="404"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11" letter-spacing="2.5" font-weight="600"
        fill="#888">SUPER THEO</text>

  <text x="360" y="404"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11" letter-spacing="2.5" font-weight="600"
        fill="#888">FLUTTER</text>

  <!-- Vertical divider between names -->
  <line x1="254" y1="390" x2="254" y2="410" stroke="#ddd" stroke-width="1"/>

  <!-- Main title -->
  <text x="254" y="440"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="bold" letter-spacing="4"
        fill="url(#titleG)">THEODORE'S WORLD</text>

  <text x="254" y="462"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" letter-spacing="3" font-weight="500"
        fill="#aaa">YOU ARE NOT LESS. YOU ARE MORE.</text>
</svg>
