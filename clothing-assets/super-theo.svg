<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 480">
  <defs>
    <!-- Suit: soft pink at shoulders → rich lavender at legs -->
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFB8D0"/>
      <stop offset="40%"  stop-color="#D490F8"/>
      <stop offset="100%" stop-color="#7B3FA8"/>
    </linearGradient>
    <!-- Cape: dark navy -->
    <linearGradient id="capeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#050d20"/>
    </linearGradient>
    <!-- Skin: warm brown with faint golden undertone -->
    <radialGradient id="skinGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#A06830"/>
      <stop offset="100%" stop-color="#7A4A18"/>
    </radialGradient>
    <!-- Gold glow for infinity symbol / cuffs -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE580"/>
      <stop offset="60%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD166"/>
      <stop offset="50%"  stop-color="#C3A9F5"/>
      <stop offset="100%" stop-color="#7B3FA8"/>
    </linearGradient>
    <!-- Red and blue for boots -->
    <linearGradient id="redBoot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8202A"/>
      <stop offset="100%" stop-color="#B81018"/>
    </linearGradient>
    <linearGradient id="blueBoot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2A60E8"/>
      <stop offset="100%" stop-color="#1040B8"/>
    </linearGradient>
  </defs>

  <!-- ══ CAPE — dark navy, long and flowing, behind everything ══ -->
  <path d="M 112,150
           C 78,168 38,232 32,312
           C 26,380 64,414 100,400
           C 126,388 144,360 150,335
           C 156,360 174,388 200,400
           C 236,414 274,380 268,312
           C 262,232 222,168 188,150 Z"
        fill="url(#capeGrad)"/>

  <!-- Cape interior: tiny gold stars (lining) -->
  <!-- Stars scattered inside cape area -->
  <circle cx="80"  cy="250" r="1.5" fill="#FFD166" opacity="0.7"/>
  <circle cx="95"  cy="280" r="1"   fill="#FFD166" opacity="0.6"/>
  <circle cx="72"  cy="308" r="1.5" fill="#FFD166" opacity="0.65"/>
  <circle cx="88"  cy="335" r="1"   fill="#FFD166" opacity="0.55"/>
  <circle cx="110" cy="320" r="1"   fill="#FFD166" opacity="0.5"/>
  <circle cx="220" cy="250" r="1.5" fill="#FFD166" opacity="0.7"/>
  <circle cx="205" cy="285" r="1"   fill="#FFD166" opacity="0.6"/>
  <circle cx="228" cy="312" r="1.5" fill="#FFD166" opacity="0.65"/>
  <circle cx="212" cy="340" r="1"   fill="#FFD166" opacity="0.55"/>
  <circle cx="190" cy="325" r="1"   fill="#FFD166" opacity="0.5"/>
  <circle cx="150" cy="260" r="1.5" fill="#FFD166" opacity="0.6"/>
  <circle cx="138" cy="295" r="1"   fill="#FFD166" opacity="0.5"/>
  <circle cx="162" cy="310" r="1"   fill="#FFD166" opacity="0.5"/>
  <!-- Tiny star shapes -->
  <g opacity="0.65">
    <line x1="60"  y1="268" x2="60"  y2="274" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
    <line x1="57"  y1="271" x2="63"  y2="271" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
    <line x1="235" y1="268" x2="235" y2="274" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
    <line x1="232" y1="271" x2="238" y2="271" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
    <line x1="120" cy="348" x2="120" y2="354" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
    <line x1="117" cy="351" x2="123" y2="351" stroke="#FFD166" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Cape clasp gold pins at collarbone -->
  <circle cx="136" cy="155" r="5" fill="#FFD166"/>
  <circle cx="164" cy="155" r="5" fill="#FFD166"/>
  <circle cx="136" cy="155" r="3" fill="#FFF3A0"/>
  <circle cx="164" cy="155" r="3" fill="#FFF3A0"/>

  <!-- ══ LEFT ARM — raised heroic pose ══ -->
  <path d="M 112,168 C 86,158 62,142 48,124"
        stroke="url(#suitGrad)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 48,124 C 38,110 32,92 36,72"
        stroke="url(#suitGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Left gold wrist cuff -->
  <ellipse cx="40" cy="76" rx="13" ry="8" fill="#FFD166" transform="rotate(-20,40,76)"/>
  <ellipse cx="40" cy="76" rx="13" ry="8" fill="none" stroke="#E8A020" stroke-width="1.5" transform="rotate(-20,40,76)"/>
  <!-- Cuff glow when using powers -->
  <ellipse cx="40" cy="76" rx="18" ry="12" fill="url(#goldGlow)" opacity="0.5" transform="rotate(-20,40,76)"/>
  <!-- Fist with golden sparks from fingertips -->
  <circle cx="38" cy="62" r="13" fill="url(#skinGrad)"/>
  <!-- Golden sparks -->
  <g transform="translate(38,62)">
    <line x1="-6" y1="-12" x2="-10" y2="-22" stroke="#FFD166" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="-13" x2="0"   y2="-24" stroke="#FFD166" stroke-width="2" stroke-linecap="round"/>
    <line x1="6"  y1="-12" x2="10"  y2="-22" stroke="#FFD166" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-10" cy="-23" r="2.5" fill="#FFD166"/>
    <circle cx="0"   cy="-25" r="2.5" fill="#FFD166"/>
    <circle cx="10"  cy="-23" r="2.5" fill="#FFD166"/>
    <circle cx="-10" cy="-23" r="5"   fill="url(#goldGlow)" opacity="0.5"/>
    <circle cx="0"   cy="-25" r="5"   fill="url(#goldGlow)" opacity="0.5"/>
    <circle cx="10"  cy="-23" r="5"   fill="url(#goldGlow)" opacity="0.5"/>
  </g>

  <!-- ══ RIGHT ARM — at side ══ -->
  <path d="M 188,168 C 210,165 228,170 238,184"
        stroke="url(#suitGrad)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 238,184 C 246,196 248,216 244,234"
        stroke="url(#suitGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Right gold wrist cuff -->
  <ellipse cx="242" cy="238" rx="13" ry="8" fill="#FFD166" transform="rotate(10,242,238)"/>
  <ellipse cx="242" cy="238" rx="13" ry="8" fill="none" stroke="#E8A020" stroke-width="1.5" transform="rotate(10,242,238)"/>
  <!-- Hand -->
  <circle cx="244" cy="250" r="13" fill="url(#skinGrad)"/>

  <!-- ══ TORSO — pink to lavender gradient suit ══ -->
  <rect x="104" y="150" width="92" height="100" rx="10" fill="url(#suitGrad)"/>

  <!-- Suit shimmer line -->
  <rect x="104" y="150" width="92" height="100" rx="10"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ══ GOLD INFINITY SYMBOL ON CHEST ══ -->
  <!-- Infinity = two overlapping circles with a figure-8 path -->
  <!-- Center of chest: (150, 195) -->
  <path d="M 150,195
           C 150,183 140,178 132,178
           C 120,178 115,187 115,195
           C 115,203 120,212 132,212
           C 140,212 147,207 150,195
           C 153,183 160,178 168,178
           C 180,178 185,187 185,195
           C 185,203 180,212 168,212
           C 160,212 153,207 150,195 Z"
        fill="#FFD166"
        stroke="#E8A020" stroke-width="1.2"/>
  <!-- Infinity glow -->
  <path d="M 150,195
           C 150,183 140,178 132,178
           C 120,178 115,187 115,195
           C 115,203 120,212 132,212
           C 140,212 147,207 150,195
           C 153,183 160,178 168,178
           C 180,178 185,187 185,195
           C 185,203 180,212 168,212
           C 160,212 153,207 150,195 Z"
        fill="none"
        stroke="#FFF3A0" stroke-width="2.5" opacity="0.6"/>
  <!-- Faint gold outer glow -->
  <ellipse cx="150" cy="195" rx="42" ry="22" fill="url(#goldGlow)" opacity="0.35"/>

  <!-- ══ LEGS ══ -->
  <rect x="110" y="248" width="32" height="95" rx="8" fill="url(#suitGrad)"/>
  <rect x="158" y="248" width="32" height="95" rx="8" fill="url(#suitGrad)"/>

  <!-- ══ BOOTS — LEFT cherry red, RIGHT royal blue ══ -->
  <!-- Left boot: cherry red -->
  <rect x="106" y="334" width="40" height="30" rx="10" fill="url(#redBoot)"/>
  <rect x="104" y="352" width="44" height="14" rx="7" fill="#9A0808"/>
  <!-- Left boot gold star on outer ankle -->
  <text x="109" y="348" font-size="10" fill="#FFD166">★</text>
  <!-- Left boot highlight -->
  <ellipse cx="120" cy="340" rx="7" ry="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Right boot: royal blue -->
  <rect x="154" y="334" width="40" height="30" rx="10" fill="url(#blueBoot)"/>
  <rect x="152" y="352" width="44" height="14" rx="7" fill="#0A2890"/>
  <!-- Right boot gold star on outer ankle -->
  <text x="185" y="348" font-size="10" fill="#FFD166">★</text>
  <!-- Right boot highlight -->
  <ellipse cx="168" cy="340" rx="7" ry="4" fill="rgba(255,255,255,0.25)"/>

  <!-- ══ HEAD ══ -->
  <circle cx="150" cy="96" r="44" fill="url(#skinGrad)"/>
  <!-- Ears -->
  <ellipse cx="106" cy="98" rx="8" ry="11" fill="#8A5020"/>
  <ellipse cx="194" cy="98" rx="8" ry="11" fill="#8A5020"/>
  <ellipse cx="106" cy="98" rx="5" ry="7"  fill="#7A4018"/>
  <ellipse cx="194" cy="98" rx="5" ry="7"  fill="#7A4018"/>

  <!-- ══ HAIR — thick wavy tousled dark brown ══ -->
  <!-- Main hair mass -->
  <path d="M 108,72
           C 106,50 118,34 138,28
           C 152,23 168,25 178,30
           C 190,36 198,50 194,72
           C 188,55 175,46 158,44
           C 144,42 128,46 118,55
           C 114,60 110,66 108,72 Z"
        fill="#1a1208"/>
  <!-- Tousled bits / volume on top -->
  <path d="M 118,55 C 122,42 138,36 150,36 C 162,36 174,42 180,52"
        fill="none" stroke="#2a1f10" stroke-width="3" stroke-linecap="round"/>
  <!-- Stray curl falling on forehead -->
  <path d="M 138,52 C 134,60 132,70 136,80"
        fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>
  <path d="M 145,50 C 148,58 147,68 144,76"
        fill="none" stroke="#1a1208" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ══ DOMINO MASK ══ -->
  <path d="M 122,96 Q 136,89 150,96 Q 164,89 178,96 Q 178,110 165,110
           Q 150,104 150,104 Q 150,104 135,110 Q 122,110 122,96 Z"
        fill="#0d1a3a" opacity="0.82"/>

  <!-- ══ EYES — luminous silver-gray ══ -->
  <circle cx="136" cy="101" r="8"   fill="white"/>
  <circle cx="164" cy="101" r="8"   fill="white"/>
  <!-- Silver-gray iris — luminous as described -->
  <circle cx="136" cy="102" r="5.5" fill="#8A9AB0"/>
  <circle cx="164" cy="102" r="5.5" fill="#8A9AB0"/>
  <!-- Darker outer ring of iris -->
  <circle cx="136" cy="102" r="5.5" fill="none" stroke="#5A6A80" stroke-width="1"/>
  <circle cx="164" cy="102" r="5.5" fill="none" stroke="#5A6A80" stroke-width="1"/>
  <!-- Pupil -->
  <circle cx="136" cy="102" r="2.8" fill="#0d1020"/>
  <circle cx="164" cy="102" r="2.8" fill="#0d1020"/>
  <!-- Silver luminous glow in eyes (the "striking, almost luminous" look) -->
  <circle cx="136" cy="102" r="8"   fill="rgba(180,200,220,0.2)"/>
  <circle cx="164" cy="102" r="8"   fill="rgba(180,200,220,0.2)"/>
  <!-- Eye shine -->
  <circle cx="138" cy="99"  r="2"   fill="white"/>
  <circle cx="166" cy="99"  r="2"   fill="white"/>
  <!-- Small lower shine -->
  <circle cx="135" cy="105" r="1"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="163" cy="105" r="1"   fill="rgba(255,255,255,0.5)"/>

  <!-- Eyebrows — determined, slightly furrowed -->
  <path d="M 126,89 Q 136,84 145,88"
        stroke="#1a1208" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 155,88 Q 164,84 174,89"
        stroke="#1a1208" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Slight furrowing between brows for determination -->
  <path d="M 146,88 Q 150,85 154,88"
        stroke="#1a1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="150" cy="112" rx="4" ry="3" fill="rgba(0,0,0,0.1)"/>

  <!-- Smile — determined but warm -->
  <path d="M 138,120 Q 150,128 162,120"
        stroke="#7A4018" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ══ FLUTTER sidekick — perched on LEFT shoulder ══ -->
  <g transform="translate(72, 148) scale(0.26)">
    <!-- Flutter wings: gold/amber/lavender -->
    <path d="M -8,-35 C -28,-58 -78,-68 -88,-48 C -98,-30 -65,-8 -8,-2"
          fill="#FFD166" opacity="0.92"/>
    <path d="M 8,-35 C 28,-58 78,-68 88,-48 C 98,-30 65,-8 8,-2"
          fill="#FFC030" opacity="0.92"/>
    <path d="M -8,4 C -28,14 -68,28 -70,44 C -72,60 -35,62 -8,48"
          fill="#C3A9F5" opacity="0.9"/>
    <path d="M 8,4 C 28,14 68,28 70,44 C 72,60 35,62 8,48"
          fill="#B8A0E8" opacity="0.9"/>
    <!-- Wing glow edges -->
    <path d="M -8,-35 C -28,-58 -78,-68 -88,-48 C -98,-30 -65,-8 -8,-2"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <path d="M 8,-35 C 28,-58 78,-68 88,-48 C 98,-30 65,-8 8,-2"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Body: deep purple -->
    <ellipse cx="0" cy="8" rx="6" ry="38" fill="#4A0878"/>
    <!-- Head -->
    <circle cx="0" cy="-40" r="13" fill="#4A0878"/>
    <!-- Turquoise eyes -->
    <circle cx="-4.5" cy="-42" r="5" fill="white"/>
    <circle cx="4.5"  cy="-42" r="5" fill="white"/>
    <circle cx="-4"   cy="-41" r="3" fill="#00CED1"/>
    <circle cx="5"    cy="-41" r="3" fill="#00CED1"/>
    <circle cx="-3.5" cy="-41" r="1.5" fill="#0d0020"/>
    <circle cx="5.5"  cy="-41" r="1.5" fill="#0d0020"/>
    <circle cx="-2.5" cy="-43" r="1"   fill="white"/>
    <circle cx="6.5"  cy="-43" r="1"   fill="white"/>
    <!-- Antennae with gold orbs -->
    <path d="M -2,-52 C -5,-62 -9,-68 -12,-72" stroke="#4A0878" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 2,-52 C 5,-62 9,-68 12,-72"    stroke="#4A0878" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="-13" cy="-74" r="4.5" fill="#FFD166"/>
    <circle cx="13"  cy="-74" r="4.5" fill="#FFD166"/>
    <circle cx="-13" cy="-74" r="2.5" fill="#FFF3A0"/>
    <circle cx="13"  cy="-74" r="2.5" fill="#FFF3A0"/>
    <!-- Gold dust from Flutter -->
    <circle cx="95" cy="-20" r="3" fill="#FFD166" opacity="0.7"/>
    <circle cx="108" cy="5"  r="2" fill="#FFD166" opacity="0.55"/>
    <circle cx="100" cy="25" r="2.5" fill="#FFD166" opacity="0.6"/>
  </g>

  <!-- ══ TEXT ══ -->
  <text x="150" y="424"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="bold" letter-spacing="6"
        fill="url(#nameGrad)">SUPER THEO</text>

  <text x="150" y="447"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" letter-spacing="3.5" font-weight="600"
        fill="#C3A9F5">THE SPECTRUM GUARDIAN</text>

  <line x1="50" y1="456" x2="250" y2="456" stroke="url(#nameGrad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
