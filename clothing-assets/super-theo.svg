<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 480">
  <defs>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFB8D0"/>
      <stop offset="40%"  stop-color="#D490F8"/>
      <stop offset="100%" stop-color="#7B3FA8"/>
    </linearGradient>
    <linearGradient id="capeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#050d20"/>
    </linearGradient>
    <radialGradient id="skinGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#A06830"/>
      <stop offset="100%" stop-color="#7A4A18"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE580"/>
      <stop offset="60%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD166"/>
      <stop offset="50%"  stop-color="#C3A9F5"/>
      <stop offset="100%" stop-color="#7B3FA8"/>
    </linearGradient>
    <linearGradient id="redBoot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8202A"/>
      <stop offset="100%" stop-color="#B81018"/>
    </linearGradient>
    <linearGradient id="blueBoot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2A60E8"/>
      <stop offset="100%" stop-color="#1040B8"/>
    </linearGradient>
  </defs>

  <!-- ══ CAPE — wide, long, behind everything ══ -->
  <!-- Wider cape for a kid — makes him look heroic despite small body -->
  <path d="M 108,155
           C 70,175 28,245 22,325
           C 16,395 58,428 98,414
           C 122,404 140,375 150,348
           C 160,375 178,404 202,414
           C 242,428 284,395 278,325
           C 272,245 230,175 192,155 Z"
        fill="url(#capeGrad)"/>
  <!-- Cape gold star lining -->
  <circle cx="72"  cy="260" r="1.8" fill="#FFD166" opacity="0.7"/>
  <circle cx="88"  cy="295" r="1.2" fill="#FFD166" opacity="0.65"/>
  <circle cx="68"  cy="325" r="1.8" fill="#FFD166" opacity="0.6"/>
  <circle cx="84"  cy="355" r="1.2" fill="#FFD166" opacity="0.55"/>
  <circle cx="228" cy="260" r="1.8" fill="#FFD166" opacity="0.7"/>
  <circle cx="212" cy="295" r="1.2" fill="#FFD166" opacity="0.65"/>
  <circle cx="232" cy="325" r="1.8" fill="#FFD166" opacity="0.6"/>
  <circle cx="216" cy="355" r="1.2" fill="#FFD166" opacity="0.55"/>
  <circle cx="150" cy="275" r="1.5" fill="#FFD166" opacity="0.6"/>
  <g opacity="0.6">
    <line x1="55"  y1="278" x2="55"  y2="284" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="52"  y1="281" x2="58"  y2="281" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="245" y1="278" x2="245" y2="284" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="242" y1="281" x2="248" y2="281" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Cape clasp gold pins -->
  <circle cx="132" cy="158" r="6" fill="#FFD166"/>
  <circle cx="168" cy="158" r="6" fill="#FFD166"/>
  <circle cx="132" cy="158" r="3.5" fill="#FFF3A0"/>
  <circle cx="168" cy="158" r="3.5" fill="#FFF3A0"/>

  <!-- ══ LEFT ARM — raised heroic ══ -->
  <!-- Shorter, chubbier arm for age 7 -->
  <path d="M 108,172 C 86,162 66,148 54,132"
        stroke="url(#suitGrad)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M 54,132 C 44,118 40,100 44,82"
        stroke="url(#suitGrad)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Gold wrist cuff left -->
  <ellipse cx="46" cy="86" rx="15" ry="9" fill="#FFD166" transform="rotate(-20,46,86)"/>
  <ellipse cx="46" cy="86" rx="15" ry="9" fill="none" stroke="#E8A020" stroke-width="1.5" transform="rotate(-20,46,86)"/>
  <ellipse cx="46" cy="86" rx="20" ry="13" fill="url(#goldGlow)" opacity="0.5" transform="rotate(-20,46,86)"/>
  <!-- Chubby fist -->
  <circle cx="44" cy="70" r="15" fill="url(#skinGrad)"/>
  <!-- Gold sparks -->
  <g transform="translate(44,70)">
    <line x1="-7" y1="-14" x2="-12" y2="-26" stroke="#FFD166" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0"  y1="-15" x2="0"   y2="-28" stroke="#FFD166" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="7"  y1="-14" x2="12"  y2="-26" stroke="#FFD166" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="-13" cy="-27" r="3" fill="#FFD166"/>
    <circle cx="0"   cy="-29" r="3" fill="#FFD166"/>
    <circle cx="13"  cy="-27" r="3" fill="#FFD166"/>
    <circle cx="-13" cy="-27" r="6" fill="url(#goldGlow)" opacity="0.5"/>
    <circle cx="0"   cy="-29" r="6" fill="url(#goldGlow)" opacity="0.5"/>
    <circle cx="13"  cy="-27" r="6" fill="url(#goldGlow)" opacity="0.5"/>
  </g>

  <!-- ══ RIGHT ARM — at side, short and chubby ══ -->
  <path d="M 192,172 C 212,168 230,173 240,186"
        stroke="url(#suitGrad)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M 240,186 C 248,198 250,218 246,236"
        stroke="url(#suitGrad)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Gold wrist cuff right -->
  <ellipse cx="244" cy="240" rx="15" ry="9" fill="#FFD166" transform="rotate(10,244,240)"/>
  <ellipse cx="244" cy="240" rx="15" ry="9" fill="none" stroke="#E8A020" stroke-width="1.5" transform="rotate(10,244,240)"/>
  <!-- Chubby hand -->
  <circle cx="246" cy="253" r="15" fill="url(#skinGrad)"/>

  <!-- ══ TORSO — compact, square-ish for a 7-year-old ══ -->
  <rect x="100" y="155" width="100" height="95" rx="14" fill="url(#suitGrad)"/>
  <rect x="100" y="155" width="100" height="95" rx="14" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- ══ GOLD INFINITY SYMBOL ON CHEST ══ -->
  <path d="M 150,198
           C 150,186 140,181 132,181
           C 120,181 115,190 115,198
           C 115,206 120,215 132,215
           C 140,215 147,210 150,198
           C 153,186 160,181 168,181
           C 180,181 185,190 185,198
           C 185,206 180,215 168,215
           C 160,215 153,210 150,198 Z"
        fill="#FFD166" stroke="#E8A020" stroke-width="1.2"/>
  <path d="M 150,198
           C 150,186 140,181 132,181
           C 120,181 115,190 115,198
           C 115,206 120,215 132,215
           C 140,215 147,210 150,198
           C 153,186 160,181 168,181
           C 180,181 185,190 185,198
           C 185,206 180,215 168,215
           C 160,215 153,210 150,198 Z"
        fill="none" stroke="#FFF3A0" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="150" cy="198" rx="42" ry="22" fill="url(#goldGlow)" opacity="0.35"/>

  <!-- ══ LEGS — short and stubby for age 7 ══ -->
  <rect x="108" y="248" width="34" height="78" rx="10" fill="url(#suitGrad)"/>
  <rect x="158" y="248" width="34" height="78" rx="10" fill="url(#suitGrad)"/>

  <!-- ══ BOOTS — SHORT, ROUNDED, KID-SIZED ══ -->
  <!-- Left boot: cherry red -->
  <rect x="102" y="318" width="46" height="28" rx="12" fill="url(#redBoot)"/>
  <rect x="100" y="336" width="50" height="14" rx="8" fill="#9A0808"/>
  <text x="106" y="334" font-size="11" fill="#FFD166">★</text>
  <ellipse cx="120" cy="325" rx="9" ry="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Right boot: royal blue -->
  <rect x="152" y="318" width="46" height="28" rx="12" fill="url(#blueBoot)"/>
  <rect x="150" y="336" width="50" height="14" rx="8" fill="#0A2890"/>
  <text x="178" y="334" font-size="11" fill="#FFD166">★</text>
  <ellipse cx="168" cy="325" rx="9" ry="5" fill="rgba(255,255,255,0.25)"/>

  <!-- ══ HEAD — BIG, round, childlike — 7-year-old proportions ══ -->
  <!-- Head is large relative to body on purpose -->
  <circle cx="150" cy="88" r="56" fill="url(#skinGrad)"/>
  <!-- Chubby cheeks — prominent for age 7 -->
  <circle cx="102" cy="102" r="18" fill="#C07830" opacity="0.3"/>
  <circle cx="198" cy="102" r="18" fill="#C07830" opacity="0.3"/>
  <!-- Ears -->
  <ellipse cx="94"  cy="90" rx="10" ry="13" fill="#8A5020"/>
  <ellipse cx="206" cy="90" rx="10" ry="13" fill="#8A5020"/>
  <ellipse cx="94"  cy="90" rx="6"  ry="8"  fill="#7A4018"/>
  <ellipse cx="206" cy="90" rx="6"  ry="8"  fill="#7A4018"/>

  <!-- ══ HAIR — thick wavy dark brown, tousled ══ -->
  <path d="M 96,64
           C 94,42 108,26 130,20
           C 144,15 162,17 174,24
           C 188,32 196,48 192,68
           C 186,50 172,40 155,38
           C 140,36 122,40 110,52
           C 104,58 100,62 96,64 Z"
        fill="#1a1208"/>
  <path d="M 110,52 C 116,38 134,30 150,30 C 166,30 180,38 188,50"
        fill="none" stroke="#2a1f10" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 126,44 C 122,54 120,66 124,78"
        fill="none" stroke="#1a1208" stroke-width="5" stroke-linecap="round"/>
  <path d="M 142,40 C 146,52 146,66 143,78"
        fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>
  <path d="M 158,42 C 162,54 162,68 158,78"
        fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>

  <!-- ══ DOMINO MASK ══ -->
  <path d="M 110,90 Q 128,82 150,90 Q 172,82 190,90 Q 190,106 174,106
           Q 150,100 150,100 Q 150,100 126,106 Q 110,106 110,90 Z"
        fill="#0d1a3a" opacity="0.82"/>

  <!-- ══ EYES — big, luminous silver-gray — large for a child ══ -->
  <circle cx="132" cy="96" r="11"  fill="white"/>
  <circle cx="168" cy="96" r="11"  fill="white"/>
  <!-- Silver-gray iris — luminous -->
  <circle cx="132" cy="97" r="7.5" fill="#8A9AB0"/>
  <circle cx="168" cy="97" r="7.5" fill="#8A9AB0"/>
  <circle cx="132" cy="97" r="7.5" fill="none" stroke="#5A6A80" stroke-width="1.2"/>
  <circle cx="168" cy="97" r="7.5" fill="none" stroke="#5A6A80" stroke-width="1.2"/>
  <!-- Pupil -->
  <circle cx="132" cy="97" r="3.8" fill="#0d1020"/>
  <circle cx="168" cy="97" r="3.8" fill="#0d1020"/>
  <!-- Silver luminous glow -->
  <circle cx="132" cy="97" r="11"  fill="rgba(180,200,220,0.2)"/>
  <circle cx="168" cy="97" r="11"  fill="rgba(180,200,220,0.2)"/>
  <!-- Eye shine — big for child -->
  <circle cx="135" cy="93" r="3"   fill="white"/>
  <circle cx="171" cy="93" r="3"   fill="white"/>
  <circle cx="129" cy="100" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="165" cy="100" r="1.2" fill="rgba(255,255,255,0.5)"/>

  <!-- Eyebrows — determined, slightly furrowed -->
  <path d="M 120,80 Q 132,74 142,79" stroke="#1a1208" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 158,79 Q 168,74 180,80" stroke="#1a1208" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 143,79 Q 150,75 157,79" stroke="#1a1208" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Small nose — button ══ -->
  <ellipse cx="150" cy="108" rx="5" ry="4" fill="rgba(0,0,0,0.1)"/>

  <!-- Smile — big warm kid smile ══ -->
  <path d="M 134,120 Q 150,132 166,120"
        stroke="#7A4018" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- ══ FLUTTER on shoulder — small, perched ══ -->
  <g transform="translate(68,148) scale(0.28)">
    <path d="M -8,-35 C -28,-58 -78,-68 -88,-48 C -98,-30 -65,-8 -8,-2"
          fill="#FFD166" opacity="0.92"/>
    <path d="M 8,-35 C 28,-58 78,-68 88,-48 C 98,-30 65,-8 8,-2"
          fill="#FFC030" opacity="0.92"/>
    <path d="M -8,4 C -28,14 -68,28 -70,44 C -72,60 -35,62 -8,48"
          fill="#C3A9F5" opacity="0.9"/>
    <path d="M 8,4 C 28,14 68,28 70,44 C 72,60 35,62 8,48"
          fill="#B8A0E8" opacity="0.9"/>
    <path d="M -8,-35 C -28,-58 -78,-68 -88,-48 C -98,-30 -65,-8 -8,-2"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <path d="M 8,-35 C 28,-58 78,-68 88,-48 C 98,-30 65,-8 8,-2"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <ellipse cx="0" cy="8" rx="6" ry="38" fill="#4A0878"/>
    <circle cx="0" cy="-40" r="13" fill="#4A0878"/>
    <circle cx="-4.5" cy="-42" r="5" fill="white"/>
    <circle cx="4.5"  cy="-42" r="5" fill="white"/>
    <circle cx="-4"   cy="-41" r="3" fill="#00CED1"/>
    <circle cx="5"    cy="-41" r="3" fill="#00CED1"/>
    <circle cx="-3.5" cy="-41" r="1.5" fill="#0d0020"/>
    <circle cx="5.5"  cy="-41" r="1.5" fill="#0d0020"/>
    <circle cx="-2.5" cy="-43" r="1"   fill="white"/>
    <circle cx="6.5"  cy="-43" r="1"   fill="white"/>
    <path d="M -2,-52 C -5,-62 -9,-68 -12,-72" stroke="#4A0878" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 2,-52 C 5,-62 9,-68 12,-72"    stroke="#4A0878" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="-13" cy="-74" r="4.5" fill="#FFD166"/>
    <circle cx="13"  cy="-74" r="4.5" fill="#FFD166"/>
    <circle cx="-13" cy="-74" r="2.5" fill="#FFF3A0"/>
    <circle cx="13"  cy="-74" r="2.5" fill="#FFF3A0"/>
    <circle cx="95" cy="-20" r="3" fill="#FFD166" opacity="0.7"/>
    <circle cx="108" cy="5"  r="2" fill="#FFD166" opacity="0.55"/>
  </g>

  <!-- ══ TEXT ══ -->
  <text x="150" y="410"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="28" font-weight="bold" letter-spacing="6"
        fill="url(#nameGrad)">SUPER THEO</text>
  <text x="150" y="432"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10" letter-spacing="3.5" font-weight="600"
        fill="#C3A9F5">THE SPECTRUM GUARDIAN · AGE 7</text>
  <line x1="50" y1="442" x2="250" y2="442" stroke="url(#nameGrad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
