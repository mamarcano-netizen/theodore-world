<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 480">
  <defs>
    <radialGradient id="skinET" cx="45%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#A06830"/>
      <stop offset="100%" stop-color="#7A4A18"/>
    </radialGradient>
    <linearGradient id="shirtET" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D8B8F8"/>
      <stop offset="100%" stop-color="#C3A9F5"/>
    </linearGradient>
    <linearGradient id="pantsET" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a3a6a"/>
      <stop offset="100%" stop-color="#1B2A6B"/>
    </linearGradient>
    <linearGradient id="bagET" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <linearGradient id="nameGradET" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C3A9F5"/>
      <stop offset="50%"  stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#6EC6F5"/>
    </linearGradient>
  </defs>

  <!-- ══ BACKPACK — on back, visible ══ -->
  <rect x="164" y="175" width="48" height="62" rx="10" fill="url(#bagET)"/>
  <rect x="166" y="178" width="44" height="54" rx="8" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>
  <!-- Bag straps -->
  <path d="M 170,175 C 167,160 165,148 168,140" stroke="#909090" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 195,175 C 194,160 193,148 193,140" stroke="#909090" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Patches -->
  <text x="170" y="196" font-size="12">🦋</text>
  <text x="184" y="210" font-size="11" fill="#FFD166">★</text>
  <rect x="170" y="212" width="22" height="9" rx="4" fill="#FF6B6B" opacity="0.5"/>
  <rect x="176" y="212" width="10" height="9" rx="2" fill="#FFD166" opacity="0.5"/>
  <text x="182" y="227" font-size="9" fill="#C0C0C0" font-weight="bold">∞</text>

  <!-- ══ ARMS — short and chubby, age 7 ══ -->
  <!-- Left arm -->
  <path d="M 106,178 C 88,178 72,186 64,200"
        stroke="url(#shirtET)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Chubby hand left -->
  <circle cx="60" cy="207" r="15" fill="url(#skinET)"/>
  <!-- Right arm — partly behind backpack -->
  <path d="M 158,178 C 160,182 162,192 161,203"
        stroke="url(#shirtET)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <circle cx="160" cy="210" r="14" fill="url(#skinET)"/>

  <!-- ══ TORSO — compact, square-ish, age 7 ══ -->
  <rect x="96" y="158" width="76" height="96" rx="16" fill="url(#shirtET)"/>
  <!-- Puzzle piece on chest — fabric marker style -->
  <g transform="translate(128,200)" opacity="0.7">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#8040C0" stroke-width="2.5"/>
    <circle cx="0"  cy="-16" r="5" fill="#8040C0"/>
    <rect x="12"  y="-4" width="9" height="8" rx="4" fill="#8040C0"/>
  </g>

  <!-- ══ HEADPHONES — navy, around neck ══ -->
  <path d="M 108,148 C 104,133 110,122 124,120 C 138,117 160,117 172,120 C 184,124 188,135 184,148"
        stroke="#1B2A6B" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Ear cups — chunkier -->
  <rect x="98"  y="142" width="17" height="22" rx="7" fill="#1B2A6B"/>
  <rect x="185" y="142" width="17" height="22" rx="7" fill="#1B2A6B"/>
  <rect x="100" y="144" width="13" height="18" rx="5" fill="#2a3a6a"/>

  <!-- ══ LEGS — short, stubby, kid legs ══ -->
  <rect x="100" y="252" width="30" height="75" rx="12" fill="url(#pantsET)"/>
  <rect x="142" y="252" width="30" height="75" rx="12" fill="url(#pantsET)"/>

  <!-- ══ SNEAKERS — rounded, kid-sized ══ -->
  <!-- Left shoe: red -->
  <rect x="93"  y="320" width="44" height="26" rx="12" fill="#E82030"/>
  <rect x="91"  y="335" width="48" height="14" rx="8"  fill="#B01020"/>
  <!-- Velcro strap -->
  <rect x="96"  y="323" width="30" height="6" rx="3" fill="#FF6080" opacity="0.8"/>
  <ellipse cx="113" cy="328" rx="10" ry="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Right shoe: blue -->
  <rect x="135" y="320" width="44" height="26" rx="12" fill="#2060E8"/>
  <rect x="133" y="335" width="48" height="14" rx="8"  fill="#1040B0"/>
  <!-- Velcro strap -->
  <rect x="138" y="323" width="30" height="6" rx="3" fill="#60A0FF" opacity="0.8"/>
  <ellipse cx="155" cy="328" rx="10" ry="5" fill="rgba(255,255,255,0.2)"/>

  <!-- ══ HEAD — big, round, childlike ══ -->
  <!-- Head large relative to body = key 7-year-old proportion -->
  <circle cx="148" cy="88" r="56" fill="url(#skinET)"/>
  <!-- Very prominent chubby cheeks for age 7 -->
  <circle cx="96"  cy="105" r="20" fill="#C07830" opacity="0.28"/>
  <circle cx="200" cy="105" r="20" fill="#C07830" opacity="0.28"/>
  <!-- Ears -->
  <ellipse cx="92"  cy="90" rx="10" ry="13" fill="#8A5020"/>
  <ellipse cx="204" cy="90" rx="10" ry="13" fill="#8A5020"/>
  <ellipse cx="92"  cy="90" rx="6"  ry="8"  fill="#7A4018"/>
  <ellipse cx="204" cy="90" rx="6"  ry="8"  fill="#7A4018"/>

  <!-- ══ HAIR — thick curly dark brown ══ -->
  <path d="M 94,62
           C 92,38 106,22 130,16
           C 144,11 162,13 174,20
           C 188,28 194,46 190,68
           C 184,50 170,40 154,38
           C 138,36 120,40 108,52
           C 102,58 98,60 94,62 Z"
        fill="#1a1208"/>
  <path d="M 108,52 C 114,38 132,30 148,30 C 164,30 178,38 186,50"
        fill="none" stroke="#2a1f10" stroke-width="4" stroke-linecap="round"/>
  <!-- Curls -->
  <path d="M 100,62 C 104,54 108,56 103,64 C 98,72 103,78 106,83"
        fill="none" stroke="#1a1208" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 124,44 C 120,54 118,68 122,80"
        fill="none" stroke="#1a1208" stroke-width="5" stroke-linecap="round"/>
  <path d="M 148,40 C 150,52 150,66 147,78"
        fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>
  <path d="M 168,44 C 172,54 172,68 168,80"
        fill="none" stroke="#1a1208" stroke-width="4" stroke-linecap="round"/>

  <!-- ══ EYES — BIG, dark green, expressive — child proportions ══ -->
  <!-- Large eyes are key for child characters -->
  <circle cx="130" cy="98" r="13"  fill="white"/>
  <circle cx="166" cy="98" r="13"  fill="white"/>
  <!-- Dark green iris -->
  <circle cx="130" cy="99" r="9"   fill="#1a6a30"/>
  <circle cx="166" cy="99" r="9"   fill="#1a6a30"/>
  <circle cx="130" cy="99" r="9"   fill="none" stroke="#2a8a40" stroke-width="1.2"/>
  <circle cx="166" cy="99" r="9"   fill="none" stroke="#2a8a40" stroke-width="1.2"/>
  <!-- Pupil -->
  <circle cx="130" cy="99" r="4.5" fill="#0a0a18"/>
  <circle cx="166" cy="99" r="4.5" fill="#0a0a18"/>
  <!-- Big eye shine — child-like sparkle -->
  <circle cx="134" cy="94" r="3.5" fill="white"/>
  <circle cx="170" cy="94" r="3.5" fill="white"/>
  <circle cx="128" cy="104" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="164" cy="104" r="1.5" fill="rgba(255,255,255,0.5)"/>

  <!-- Eyebrows — soft, gentle -->
  <path d="M 118,82 Q 130,76 141,81" stroke="#1a1208" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 155,81 Q 166,76 178,82" stroke="#1a1208" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Small button nose -->
  <ellipse cx="148" cy="112" rx="5" ry="4" fill="rgba(0,0,0,0.1)"/>

  <!-- Smile — gentle, slightly shy, warm ══ -->
  <path d="M 133,124 Q 148,136 163,124"
        stroke="#7A4018" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- ══ TEXT ══ -->
  <text x="150" y="410"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="26" font-weight="bold" letter-spacing="5"
        fill="url(#nameGradET)">THEODORE</text>
  <text x="150" y="432"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10" letter-spacing="3" font-weight="600"
        fill="#C3A9F5">THE BOY · AGE 7</text>
  <line x1="50" y1="442" x2="250" y2="442" stroke="url(#nameGradET)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
