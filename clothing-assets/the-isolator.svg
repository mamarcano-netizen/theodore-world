<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 480">
  <defs>
    <radialGradient id="skinTI" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#5a5a6a"/>
      <stop offset="60%"  stop-color="#3a3a48"/>
      <stop offset="100%" stop-color="#252530"/>
    </radialGradient>
    <linearGradient id="coatTI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <radialGradient id="eyeTI" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#050508"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="bubbleTI" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(40,60,120,0.05)"/>
      <stop offset="70%"  stop-color="rgba(40,60,120,0.12)"/>
      <stop offset="100%" stop-color="rgba(40,60,120,0.25)"/>
    </radialGradient>
    <linearGradient id="nameTI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a3a60"/>
      <stop offset="50%"  stop-color="#6080c0"/>
      <stop offset="100%" stop-color="#3a3a60"/>
    </linearGradient>
    <linearGradient id="veinTI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2040a0"/>
      <stop offset="50%"  stop-color="#4060d0"/>
      <stop offset="100%" stop-color="#2040a0"/>
    </linearGradient>
  </defs>

  <!-- ══ ISOLATION BUBBLE FORCE FIELD (from left hand) ══ -->
  <ellipse cx="52" cy="215" rx="36" ry="36" fill="url(#bubbleTI)"/>
  <ellipse cx="52" cy="215" rx="36" ry="36" fill="none" stroke="rgba(40,80,180,0.4)" stroke-width="2"/>
  <ellipse cx="52" cy="215" rx="28" ry="28" fill="none" stroke="rgba(40,80,180,0.2)" stroke-width="1"/>
  <!-- Small person trapped inside bubble -->
  <circle cx="52" cy="208" r="6" fill="rgba(200,200,220,0.5)"/>
  <rect x="49" y="214" width="6" height="10" rx="2" fill="rgba(200,200,220,0.5)"/>

  <!-- ══ FLOOR-LENGTH COAT — matte black, merges with shadows ══ -->
  <!-- Coat sides — very wide, dramatic -->
  <path d="M 88,165 C 62,200 38,260 30,340 C 22,400 40,440 70,445 L 78,445 L 82,270 Z"
        fill="url(#coatTI)"/>
  <path d="M 212,165 C 238,200 262,260 270,340 C 278,400 260,440 230,445 L 222,445 L 218,270 Z"
        fill="url(#coatTI)"/>
  <rect x="82" y="258" width="136" height="187" rx="4" fill="url(#coatTI)"/>

  <!-- ══ DARK SHADOWY TENDRILS wrapped like chains ══ -->
  <!-- Tendrils from torso reaching outward -->
  <path d="M 100,200 C 78,210 62,225 50,240" stroke="#2a2a3a" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 100,220 C 75,228 58,245 44,260" stroke="#1a1a28" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 200,200 C 222,210 238,225 250,240" stroke="#2a2a3a" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 200,220 C 225,228 242,245 256,260" stroke="#1a1a28" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Tendrils reaching down -->
  <path d="M 140,258 C 132,290 128,320 132,350" stroke="#252535" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 160,258 C 168,290 172,320 168,350" stroke="#252535" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- HIGH STIFF COLLAR — rising past jaw ══ -->
  <rect x="122" y="130" width="56" height="38" rx="4" fill="#151518"/>
  <rect x="122" y="130" width="56" height="38" rx="4" fill="none" stroke="#252530" stroke-width="1"/>

  <!-- ══ ARMS — long, bony, claw-like, elongated ══ -->
  <!-- LEFT arm — unnaturally long, claw outstretched -->
  <path d="M 88,172 C 68,178 50,192 38,210"
        stroke="url(#skinTI)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Bony claw left — elongated fingers -->
  <circle cx="34" cy="215" r="10" fill="url(#skinTI)"/>
  <!-- Claw fingers — sharp, elongated -->
  <path d="M 26,210 C 18,202 14,194 18,188" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 30,206 C 22,198 20,188 24,182" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 35,204 C 30,194 30,184 34,178" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 40,206 C 38,196 40,186 46,182" stroke="url(#skinTI)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Claw tips -->
  <circle cx="18" cy="187" r="2.5" fill="#1a1a28"/>
  <circle cx="23" cy="181" r="2.5" fill="#1a1a28"/>
  <circle cx="33" cy="177" r="2.5" fill="#1a1a28"/>
  <circle cx="46" cy="181" r="2.5" fill="#1a1a28"/>

  <!-- RIGHT arm -->
  <path d="M 212,172 C 232,178 250,192 262,210"
        stroke="url(#skinTI)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Bony claw right -->
  <circle cx="266" cy="215" r="10" fill="url(#skinTI)"/>
  <path d="M 274,210 C 282,202 286,194 282,188" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 270,206 C 278,198 280,188 276,182" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 265,204 C 270,194 270,184 266,178" stroke="url(#skinTI)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 260,206 C 262,196 260,186 254,182" stroke="url(#skinTI)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="282" cy="187" r="2.5" fill="#1a1a28"/>
  <circle cx="277" cy="181" r="2.5" fill="#1a1a28"/>
  <circle cx="267" cy="177" r="2.5" fill="#1a1a28"/>
  <circle cx="254" cy="181" r="2.5" fill="#1a1a28"/>

  <!-- ══ TORSO — coat front ══ -->
  <rect x="88" y="155" width="124" height="110" rx="6" fill="url(#coatTI)"/>
  <!-- No texture, no reflection — pure matte black -->

  <!-- ══ HEAD — long, hollow, gaunt ══ -->
  <!-- Elongated head shape — long and narrow -->
  <path d="M 114,130 Q 112,70 150,60 Q 188,70 186,130 Q 188,155 150,158 Q 112,155 114,130 Z"
        fill="url(#skinTI)"/>
  <!-- Sunken cheeks — very hollow -->
  <path d="M 118,115 Q 112,105 116,95" stroke="#252530" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 182,115 Q 188,105 184,95" stroke="#252530" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Sharp pointed chin -->
  <path d="M 130,150 Q 150,162 170,150" fill="url(#skinTI)"/>

  <!-- ══ BALD HEAD — smooth, with pulsing blue vein lines ══ -->
  <!-- Main vein lines — cold blue pulsing -->
  <path d="M 150,60 C 148,50 142,42 138,35" stroke="url(#veinTI)" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 150,60 C 152,50 158,42 162,35" stroke="url(#veinTI)" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 135,65 C 128,56 120,50 115,44" stroke="url(#veinTI)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 165,65 C 172,56 180,50 185,44" stroke="url(#veinTI)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 128,72 C 118,66 110,60 106,52" stroke="url(#veinTI)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 172,72 C 182,66 190,60 194,52" stroke="url(#veinTI)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- Vein glow dots -->
  <circle cx="138" cy="35" r="3" fill="#4060d0" opacity="0.6"/>
  <circle cx="162" cy="35" r="3" fill="#4060d0" opacity="0.6"/>
  <circle cx="115" cy="44" r="2" fill="#4060d0" opacity="0.5"/>
  <circle cx="185" cy="44" r="2" fill="#4060d0" opacity="0.5"/>

  <!-- ══ EYES — empty black voids, no whites, no pupils ══ -->
  <!-- Deep sunken eye sockets -->
  <ellipse cx="130" cy="105" rx="16" ry="13" fill="#0a0a14" opacity="0.9"/>
  <ellipse cx="170" cy="105" rx="16" ry="13" fill="#0a0a14" opacity="0.9"/>
  <!-- Pure void eyes — absolutely no shine, no reflection -->
  <ellipse cx="130" cy="105" rx="13" ry="10" fill="url(#eyeTI)"/>
  <ellipse cx="170" cy="105" rx="13" ry="10" fill="url(#eyeTI)"/>
  <!-- Barely perceptible dark rings -->
  <ellipse cx="130" cy="105" rx="13" ry="10" fill="none" stroke="#1a1a28" stroke-width="1.5"/>
  <ellipse cx="170" cy="105" rx="13" ry="10" fill="none" stroke="#1a1a28" stroke-width="1.5"/>

  <!-- Eyebrows — non-existent, just shadow -->
  <path d="M 116,90 Q 130,86 143,90" stroke="#1a1a25" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 157,90 Q 170,86 184,90" stroke="#1a1a25" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Nose — sharp, pointed downward -->
  <path d="M 150,112 L 144,126 Q 150,130 156,126 Z" fill="#2a2a38" opacity="0.6"/>

  <!-- Mouth — thin, almost not there ══ -->
  <path d="M 136,140 Q 150,142 164,140"
        stroke="#3a3a48" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Color drain effect — gray fog at feet -->
  <ellipse cx="150" cy="445" rx="80" ry="12" fill="rgba(150,150,170,0.15)"/>

  <!-- ══ TEXT ══ -->
  <text x="150" y="400"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="bold" letter-spacing="2"
        fill="url(#nameTI)">THE ISOLATOR</text>
  <text x="150" y="422"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" letter-spacing="3" font-weight="600"
        fill="#6080c0">THE DISCONNECTOR</text>
  <line x1="50" y1="430" x2="250" y2="430" stroke="url(#nameTI)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
