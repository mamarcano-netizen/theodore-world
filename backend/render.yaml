services:
  - type: web
    name: theodores-world-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./theodores_world.db
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: marcano.alerts@gmail.com
